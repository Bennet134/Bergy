<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero V3 – Cinematic Full-Bleed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; }

    .hero-v3 {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .hero-v3-bg {
      position: absolute;
      inset: 0;
      background-image: url('Images/Start/Hallenbild-Berghoff-2022.jpg.jpeg');
      background-size: cover;
      background-position: center;
    }

    /* Gradient: transparent top, dark bottom */
    .hero-v3-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0.15) 40%,
        rgba(0,0,0,0.75) 70%,
        rgba(0,0,0,0.95) 100%
      );
    }

    /* Accent gradient left edge */
    .hero-v3-accent-edge {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, transparent, #009fe3 40%, #009fe3 80%, transparent);
    }

    .hero-v3-content {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 72px 72px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 48px;
      align-items: flex-end;
    }

    .hero-v3-left {}

    .hero-v3-slogan {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 14px;
    }
    .hero-v3-slogan strong {
      color: #009fe3;
      font-weight: 600;
    }

    .hero-v3-headline {
      font-size: clamp(2.4rem, 4.5vw, 4.2rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin: 0 0 24px;
      max-width: 700px;
    }

    .hero-v3-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Right column: cert stack */
    .hero-v3-right {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 4px;
    }
    .hero-v3-cert-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }
    .hero-v3-cert-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #009fe3;
      flex-shrink: 0;
    }

    /* Stats strip above content */
    .hero-v3-stats {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .hero-v3-stat {
      background: rgba(0,159,227,0.85);
      backdrop-filter: blur(8px);
      padding: 14px 24px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .hero-v3-stat-num {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .hero-v3-stat-label {
      display: block;
      font-size: 0.62rem;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="hero-v3">
  <div class="hero-v3-bg"></div>
  <div class="hero-v3-overlay"></div>
  <div class="hero-v3-accent-edge"></div>

  <!-- Stats sidebar top-right -->
  <div class="hero-v3-stats">
    <div class="hero-v3-stat">
      <span class="hero-v3-stat-num">40+</span>
      <span class="hero-v3-stat-label">Jahre</span>
    </div>
    <div class="hero-v3-stat">
      <span class="hero-v3-stat-num">2</span>
      <span class="hero-v3-stat-label">Standorte</span>
    </div>
    <div class="hero-v3-stat">
      <span class="hero-v3-stat-num">±0,002</span>
      <span class="hero-v3-stat-label">mm Toleranz</span>
    </div>
  </div>

  <div class="hero-v3-content">
    <div class="hero-v3-left">
      <div class="hero-v3-slogan">pure performance · <strong>absolute precision</strong></div>
      <h1 class="hero-v3-headline">
        Vom Rohling zur Baugruppe,<br>alles aus einer Hand.
      </h1>
      <div class="hero-v3-actions">
        <a href="index.html#kontakt" class="btn btn-primary">Anfrage stellen</a>
        <a href="index.html#leistungen" class="btn btn-outline" style="border-color:rgba(255,255,255,0.25);color:#fff;">Leistungen ansehen</a>
      </div>
    </div>

    <div class="hero-v3-right">
      <div class="hero-v3-cert-item">
        <span class="hero-v3-cert-dot"></span>ISO 9001 zertifiziert
      </div>
      <div class="hero-v3-cert-item">
        <span class="hero-v3-cert-dot"></span>EN 9100 zertifiziert
      </div>
      <div class="hero-v3-cert-item">
        <span class="hero-v3-cert-dot"></span>Rolls-Royce Approved
      </div>
    </div>
  </div>
</div>

</body>
</html>
